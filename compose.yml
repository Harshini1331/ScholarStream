services:
  # 1. PostgreSQL - Metadata & Airflow Backend
  postgres:
    image: postgres:16-alpine
    container_name: ss-postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_user -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. OpenSearch - Vector Database
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: ss-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health?local=true"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. OpenSearch Dashboards - Visualization UI
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: ss-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - SERVER_HOST=0.0.0.0
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  # 4. Ollama - GPU Accelerated Inference (RTX 5070)
  ollama:
    image: ollama/ollama
    container_name: ss-ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_LOADED_MODELS=2
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 5. Redis - Response Cache
  redis:
    image: redis:7-alpine
    container_name: ss-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 6. Apache Airflow - Scheduled Ingestion
  airflow:
    build: .
    image: scholar-stream-app:latest
    container_name: ss-airflow
    command: /opt/venv/bin/airflow standalone
    user: "0:0"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://rag_user:rag_password@postgres:5432/rag_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW_HOME=/opt/airflow
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_db
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__TTL_HOURS=24
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ./dags:/opt/airflow/dags
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy

  # 7. FastAPI - RAG Serving Layer
  api:
    build: .
    image: scholar-stream-app:latest
    container_name: ss-api
    ports:
      - "8000:8000"
    command: /opt/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_db
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS__HOST=redis
      - REDIS__PORT=6379
      - REDIS__TTL_HOURS=24
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  opensearch_data:
  ollama_data: