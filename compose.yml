services:
  # 1. PostgreSQL - Paper metadata storage (Port 5432)
  postgres:
    image: postgres:16-alpine
    container_name: ss-postgres
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: rag_user
      POSTGRES_PASSWORD: rag_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistence for your papers

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: ss-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data # Persistence for vector embeddings

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: ss-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - SERVER_HOST=0.0.0.0
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      - opensearch

  # 4. Ollama - Local LLM inference (Port 11434)
  ollama:
    image: ollama/ollama
    container_name: ss-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama # Persistent storage for your downloaded LLM models

  # 5. Apache Airflow - Workflow automation (Port 8080)
  airflow:
    image: apache/airflow:2.7.1
    container_name: ss-airflow
    command: standalone
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://rag_user:rag_password@postgres:5432/rag_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # 6. FastAPI - The REST API server (Port 8000)
  api:
    build: .
    image: scholar-stream-app:latest
    container_name: ss-api
    ports:
      - "8000:8000"
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - venv_data:/app/.venv  # PRO TIP: Isolates heavy libs in high-speed Linux memory
    environment:
      - DATABASE_URL=postgresql://rag_user:rag_password@postgres:5432/rag_db
      - OPENSEARCH_URL=http://opensearch:9200
    depends_on:
      - postgres
      - opensearch

# Define the high-performance Named Volumes
volumes:
  postgres_data:
  opensearch_data:
  ollama_data:
  venv_data: # This manages your 164 packages natively